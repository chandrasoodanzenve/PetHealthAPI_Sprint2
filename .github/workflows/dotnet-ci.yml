name: PetHealthAPI CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore PetHealthAPI.sln

    - name: Build
      run: dotnet build PetHealthAPI.sln --no-restore

    - name: Run Tests
      run: dotnet test PetHealthAPI.sln --no-build --verbosity normal