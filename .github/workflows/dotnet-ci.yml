name: PetHealthAPI CI Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      Jwt__Key: ${{ secrets.JWT_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Tests
        run: dotnet test --no-build --configuration Release --verbosity normal

         # 4. Docker Image Generation 
      - name: Build Docker Image
        run: |
        docker build -t pethealthapi:latest -t pethealthapi:${{ github.run_number }} .
        echo "Docker image built with tag: v${{ github.run_number }}"

        # 5. Staging Simulation 
      - name: Deploy to Staging (Simulation)
        if: github.ref == 'refs/heads/main'
        run: |
        echo "Deploying version v${{ github.run_number }} to Staging Server..."
        echo "Status: Success"
