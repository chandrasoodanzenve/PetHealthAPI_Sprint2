name: PetHealthAPI Enterprise CI-CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      Jwt__Key: ${{ secrets.JWT_KEY }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build and Code Quality Check
      run: dotnet build --no-restore --configuration Release

    - name: Run Automated Tests
      run: dotnet test --no-build --configuration Release --verbosity normal

    - name: Docker Build and Version Tagging
      run: |
        docker build -t pethealthapi:latest -t pethealthapi:${{ github.run_number }} .
        echo "Successfully created image v${{ github.run_number }}"

    - name: Deploy to Staging (Simulation)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Deploying version v${{ github.run_number }} to Staging Environment..."
        echo "Deployment Success!"

    - name: Rollback Procedure (Simulation)
      if: failure()
      run: |
        echo "Build or Test failed! Triggering automatic rollback to last stable version..."
        echo "Rollback initiated successfully."