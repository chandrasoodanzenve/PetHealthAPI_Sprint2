apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: pethealth-kv-secrets
  namespace: pethealth-prod
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    keyvaultName: "PetHealthKeyVault"
    objects: |
      array:
        - |
          objectName: DbPassword
          objectType: secret
          objectVersion: ""
