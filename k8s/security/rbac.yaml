apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: pethealth-prod
  name: api-reader
rules:
- apiGroups: [""]
  resources: ["pods", "configmaps"]
  verbs: ["get", "list"] 
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-reader-binding
  namespace: pethealth-prod
subjects:
- kind: ServiceAccount
  name: pethealth-sa
  namespace: pethealth-prod
roleRef:
  kind: Role
  name: api-reader
  apiGroup: rbac.authorization.k8s.io