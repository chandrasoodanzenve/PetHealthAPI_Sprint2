version: '3.8'

services:
  # PetHealth API Service
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DatabaseProvider=SqlServer
      - ConnectionStrings__SqlServerConnection=Server=sqlserver;Database=PetPulseDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=True
    depends_on:
      - sqlserver

  # SQL Server Service
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Password123
    ports:
      - "1433:1433"